# railway.toml — Railway deploy config for the FINARODA backend.
# PREPARED, NOT DEPLOYED. Nadav triggers the actual deploy manually.
# Setup: connect the GitHub repo in Railway, mount a volume at /app/data for SQLite,
# set env vars from backend/.env.example (names only there — real values in dashboard).

[build]
builder = "nixpacks"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ── Cron wiring (Stage 8) ────────────────────────────────────────────────────
# TWO mechanisms, by design:
#   1. resolve-scenarios — a native in-container batch job (below). It has NO HTTP
#      endpoint (it reads Bybit klines and resolves journal outcomes). It must run
#      BEFORE the notifications sweep so the reveal-teaser sees freshly resolved rows.
#   2. notifications + billing sweeps — the HTTP cron endpoints
#      POST /api/cron/notifications and POST /api/cron/billing, protected by the
#      X-Cron-Secret header. Wire these with an external scheduler (Railway scheduled
#      job / cron-job.org / GitHub Actions). Exact commands + recommended frequencies
#      are in the "CRON WIRING (Railway, manual)" section of SESSION_HANDOFF. Both are
#      idempotent (a second run in-window is a no-op).
#
# NOTE: the old native `expire-trials` / `trial-ending-soon` crons were folded into the
# billing + notifications HTTP endpoints; the `subscription-renewal` cron was removed
# entirely — Stripe Billing + Smart Retries own recurring charges + dunning since
# Stage 3R (its script no longer exists).

# Cron: resolve journal scenarios against real market data. Daily 04:00 UTC (~06:00 IST),
# ahead of the notifications sweep.
[[crons]]
name = "resolve-scenarios"
schedule = "0 4 * * *"
command = "python -m backend.scripts.run_resolve_scenarios"
