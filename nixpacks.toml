# nixpacks.toml — Railway build config. Installs Litestream alongside the Python app.

[phases.setup]
nixPkgs = ["python313", "litestream"]

[phases.install]
cmds = [
  "curl -sS https://bootstrap.pypa.io/get-pip.py | python",
  "python -m pip install -r backend/requirements.txt",
]

[start]
# Litestream wraps uvicorn — replicates SQLite → R2 in real time.
cmd = "litestream replicate -config litestream.yml -exec 'uvicorn backend.main:app --host 0.0.0.0 --port $PORT'"
