# Frontend (Next.js) — Node-ONLY build for Railway.
#
# This service's Root Directory MUST be "frontend" so Railway reads THIS config and
# NOT the repo-root config: that avoids (a) the Python provider, (b) the backend's
# `/api/health` healthcheck, and (c) the backend's Python cron jobs — all of which
# live in the repo-root railway.toml / nixpacks.toml and would break a frontend deploy.
#
# `providers = ['node']` pins the build to Node only.
#
# pnpm is installed DIRECTLY via npm (NOT corepack) to avoid the corepack keyid
# signature-verification error ("Cannot find matching keyid") seen on Node 22.
#
# The shared engine (`link:../shared`) resolves because Railway includes the entire
# repository in the build even when a Root Directory is set — `../shared` is on disk.

providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22']

[phases.install]
cmds = [
  'npm install -g pnpm@10.33.1',
  'pnpm install --no-frozen-lockfile',
]

[phases.build]
cmds = ['pnpm run build']

[start]
cmd = 'pnpm exec next start -p $PORT'
