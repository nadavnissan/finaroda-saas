# litestream.yml — continuous SQLite replication to Cloudflare R2 (production, Railway).
# Required env vars (set in Railway dashboard, not here):
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_DB_BACKUP
# Restore:
#   litestream restore -o data/finaroda.db s3://${R2_BUCKET_DB_BACKUP}/finaroda.db

dbs:
  - path: data/finaroda.db
    replicas:
      - type: s3
        bucket: ${R2_BUCKET_DB_BACKUP}
        path: finaroda.db
        endpoint: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        force-path-style: true
        sync-interval: 10s
        retention: 24h
        snapshot-interval: 1h
